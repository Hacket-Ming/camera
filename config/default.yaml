# 摄像头配置
camera:
  # 来源类型: local / rtsp / file
  source_type: local
  # 本地摄像头索引
  device_index: 0
  # RTSP 地址（source_type 为 rtsp 时使用）
  rtsp_url: ""
  # 视频文件路径（source_type 为 file 时使用）
  video_path: ""
  # 采集帧率（0 表示不限制，按摄像头原始帧率）
  fps: 0
  # 分辨率
  width: 1280
  height: 720

# 检测器配置
detector:
  # 模型名称（ultralytics 格式）
  model: yolov8n.pt
  # 置信度阈值
  confidence: 0.5
  # 关注的目标类别（COCO 类别名）
  target_classes:
    - person
    - backpack
    - handbag
    - suitcase
    - bottle
    - cup
    - cell phone
    - book

# 分析器配置
analyzer:
  # 感兴趣区域（归一化坐标 0~1，留空表示全画面）
  roi: []
  # 物体消失判定帧数（连续 N 帧未检测到则判定消失）
  disappear_frames: 15
  # 行为告警冷却时间（秒）
  alert_cooldown: 10

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8000
  # 推送画面质量（JPEG 压缩质量 1-100）
  stream_quality: 70

# 数据库配置
database:
  path: data/events/events.db
