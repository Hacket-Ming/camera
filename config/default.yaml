# 摄像头配置
camera:
  # 来源类型: local / rtsp / file
  source_type: local
  # 本地摄像头索引
  device_index: 0
  # RTSP 地址（source_type 为 rtsp 时使用）
  rtsp_url: ""
  # 视频文件路径（source_type 为 file 时使用）
  video_path: ""
  # 采集帧率（0 表示不限制，按摄像头原始帧率）
  fps: 0
  # 分辨率
  width: 1280
  height: 720

# 检测器配置
detector:
  # 模型名称（ultralytics 格式）
  model: yolov8n.pt
  # 置信度阈值
  confidence: 0.5
  # 关注的目标类别（COCO 类别名）
  target_classes:
    - person
    - backpack
    - handbag
    - suitcase
    - bottle
    - cup
    - cell phone
    - book
  # 追踪配置（启用后用 ByteTrack 给每个检测分配 track_id）
  tracking:
    enabled: true
    tracker: bytetrack.yaml

# 分析器配置
analyzer:
  # 感兴趣区域（归一化坐标 0~1，留空表示全画面）
  roi: []
  # 物体连续 N 帧未出现则判定消失
  disappear_frames: 15
  # 物体消失前查看最近 N 帧内是否有人靠近
  recent_frames_window: 30
  # 物体与人的关联距离（像素，bbox 中心距离阈值）
  proximity_distance: 200
  # 行为告警冷却时间（秒）
  alert_cooldown: 10

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8000
  # 推送画面质量（JPEG 压缩质量 1-100）
  stream_quality: 70

# 数据库配置（向下兼容）
database:
  path: data/events/events.db

# 事件存储配置（Phase 3）
storage:
  enabled: true
  database_path: data/events/events.db
  snapshot_dir: data/snapshots
